<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>frontend</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <script>
      function saveInitData() {
        window.__TG_INIT_DATA__ = window.Telegram?.WebApp?.initData || '';
        if (!window.__TG_INIT_DATA__) {
          setTimeout(saveInitData, 100);
        }
      }
      setTimeout(saveInitData, 200);
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
    <script>
      setTimeout(() => {
        alert('Telegram: ' + (window.Telegram ? 'OK' : 'НЕТ') + 
              '\ninitData: ' + (window.Telegram?.WebApp?.initData ? 'ЕСТЬ' : 'ПУСТО'));
      }, 1500);
    </script>
  </body>
</html>
